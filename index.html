<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MG 금융 인사이트</title>
  <meta
    name="description"
    content="뉴스와 금융 용어를 함께 제공하는 학습형 금융 뉴스 플랫폼"
  />
  <link rel="icon" type="image/png" href="./assets/mg-logo.png" />
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #2b2f36;
      --sub: #5f6b7a;
      --line: #dbe2ea;
      --primary: #3182f6;
      --primary-strong: #1b64da;
      --primary-soft: #eaf3ff;
      --primary-soft-2: #f3f8ff;
      --title-blue: #1b64da;
      --heading-blue: #1757bb;
      --chip-blue: #edf4ff;
      --chip-blue-text: #1b64da;
      --term-bg: linear-gradient(135deg, #0f5fe5 0%, #3b82f6 100%);
      --term-text: #ffffff;
      --shadow: 0 10px 28px rgba(49, 130, 246, 0.08);
      --radius-xl: 24px;
      --max: 1080px;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
      line-height: 1.7;
      -webkit-text-size-adjust: 100%;
    }
    body { font-size: 18px; }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; }

    .wrap {
      width: 100%;
      max-width: var(--max);
      margin: 0 auto;
      padding: 20px 18px 44px;
    }

    .hero {
      background: linear-gradient(180deg, #ffffff 0%, #f7fbff 100%);
      border: 1px solid #d7e6fb;
      border-radius: 28px;
      padding: 30px 24px 28px;
      box-shadow: var(--shadow);
      margin-bottom: 22px;
      text-align: center;
    }

    .brand-mark {
      width: 76px;
      height: 76px;
      margin: 0 auto 16px;
      border-radius: 22px;
      background: #ffffff;
      border: 1px solid #d7e6fb;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(49, 130, 246, 0.1);
      overflow: hidden;
    }
    .brand-mark img {
      width: 58px;
      height: 58px;
      object-fit: contain;
      display: block;
    }

    .hero h1 {
      margin: 0;
      font-size: 44px;
      line-height: 1.25;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--title-blue);
      text-align: center;
      word-break: keep-all;
      overflow-wrap: normal;
    }

    .hero-title-date { display: inline; white-space: nowrap; }

    .hero-actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 56px;
      padding: 0 22px;
      border-radius: 16px;
      border: 1px solid transparent;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.18s ease;
      min-width: 220px;
    }
    .btn-primary {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      box-shadow: 0 6px 16px rgba(49, 130, 246, 0.24);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      background: var(--primary-strong);
      border-color: var(--primary-strong);
    }
    .btn-ghost {
      background: white;
      color: var(--primary-strong);
      border-color: #cfe1ff;
    }
    .btn-ghost:hover { background: var(--primary-soft-2); }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      margin-bottom: 26px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 24px;
      text-align: center;
    }
    .card-title {
      margin: 0 0 12px;
      font-size: 34px;
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--heading-blue);
      line-height: 1.3;
      text-align: center;
      word-break: keep-all;
      overflow-wrap: normal;
    }
    .card-desc {
      margin: 0;
      color: var(--sub);
      font-size: 20px;
      line-height: 1.8;
      font-weight: 600;
      text-align: center;
      word-break: keep-all;
      overflow-wrap: normal;
    }

    .today-term-key {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 18px;
      padding: 18px 28px;
      border-radius: 24px;
      background: var(--term-bg);
      color: var(--term-text);
      border: 0;
      font-size: 34px;
      font-weight: 900;
      line-height: 1.2;
      min-height: 84px;
      box-shadow: 0 12px 28px rgba(27, 100, 218, 0.22);
      letter-spacing: -0.02em;
    }
    .today-term-meaning {
      margin: 22px 0 14px;
      font-size: 32px;
      font-weight: 900;
      line-height: 1.55;
      color: var(--heading-blue);
      text-align: center;
      word-break: keep-all;
      overflow-wrap: normal;
    }
    .today-term-detail {
      margin: 0 auto;
      max-width: 820px;
      color: #566273;
      font-size: 22px;
      line-height: 1.9;
      font-weight: 600;
      text-align: center;
      word-break: keep-all;
      overflow-wrap: normal;
    }

    .term-actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .mini-link {
      display: inline-flex;
      align-items: center;
      font-size: 18px;
      font-weight: 900;
      color: var(--primary-strong);
    }

    .section-head {
      display: flex;
      justify-content: center;
      margin-bottom: 14px;
      text-align: center;
    }
    .section-title-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }
    .section-head h2 {
      margin: 0;
      font-size: 42px;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--heading-blue);
      line-height: 1.25;
      text-align: center;
      word-break: keep-all;
      overflow-wrap: normal;
    }
    .section-main-icon {
      width: 78px;
      height: 78px;
      border-radius: 24px;
      background: var(--primary-soft);
      border: 1px solid #cfe1ff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--primary-strong);
      flex: 0 0 78px;
    }
    .section-main-icon svg {
      width: 40px;
      height: 40px;
      display: block;
    }

    .news-list {
      display: grid;
      gap: 14px;
    }
    .news-item {
      display: block;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 24px 22px;
      transition: 0.18s ease;
    }
    .news-item:hover { transform: translateY(-2px); }

    .news-title {
      margin: 0;
      font-size: 31px;
      font-weight: 900;
      line-height: 1.5;
      letter-spacing: -0.02em;
      color: var(--heading-blue);
      word-break: keep-all;
      overflow-wrap: normal;
    }
    .news-summary {
      margin: 14px 0 0;
      color: #4f5d70;
      font-size: 20px;
      line-height: 1.8;
      font-weight: 600;
      word-break: keep-all;
      overflow-wrap: normal;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .news-bottom {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }
    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 42px;
      border-radius: 999px;
      padding: 0 16px;
      font-size: 16px;
      font-weight: 900;
      line-height: 1.4;
      white-space: normal;
    }
    .chip-term {
      background: var(--chip-blue);
      color: var(--chip-blue-text);
      border: 1px solid #cfe1ff;
    }

    .empty, .loading, .error {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 24px;
      color: var(--sub);
      box-shadow: var(--shadow);
      font-size: 20px;
      font-weight: 700;
      line-height: 1.7;
      text-align: center;
    }
    .footer-note {
      margin-top: 22px;
      color: var(--sub);
      font-size: 16px;
      text-align: center;
      line-height: 1.8;
      font-weight: 600;
      word-break: keep-all;
      overflow-wrap: normal;
    }

    @media (max-width: 900px) {
      .hero h1 { font-size: 40px; }
      .card-title { font-size: 30px; }
      .today-term-key { font-size: 28px; min-height: 76px; padding: 16px 24px; }
      .today-term-meaning { font-size: 28px; }
      .today-term-detail { font-size: 20px; }
      .section-head h2 { font-size: 36px; }
      .section-main-icon { width: 68px; height: 68px; flex-basis: 68px; }
      .news-title { font-size: 28px; }
      .news-summary { font-size: 19px; }
    }

    @media (max-width: 768px) {
      .wrap { padding: 14px 12px 32px; }
      .hero { padding: 24px 18px 22px; border-radius: 24px; }
      .brand-mark { width: 64px; height: 64px; border-radius: 18px; }
      .brand-mark img { width: 50px; height: 50px; }
      .hero h1 { font-size: 36px; }
      .btn { min-height: 54px; font-size: 19px; width: 100%; }
      .card { padding: 20px; }
      .card-title { font-size: 30px; }
      .today-term-key { font-size: 24px; min-height: 70px; padding: 16px 22px; border-radius: 22px; }
      .today-term-meaning { font-size: 25px; }
      .today-term-detail { font-size: 18px; }
      .section-title-row { gap: 14px; }
      .section-head h2 { font-size: 32px; }
      .section-main-icon { width: 60px; height: 60px; flex-basis: 60px; border-radius: 18px; }
      .section-main-icon svg { width: 30px; height: 30px; }
      .news-item { padding: 20px 18px; }
      .news-title { font-size: 23px; }
      .news-summary { font-size: 17px; -webkit-line-clamp: 2; }
      .chip { font-size: 14px; padding: 8px 14px; }
    }

    @media (max-width: 480px) {
      .hero h1 { font-size: 31px; }
      .card-title { font-size: 27px; }
      .today-term-key { font-size: 22px; min-height: 64px; width: 100%; max-width: 100%; }
      .today-term-meaning { font-size: 22px; }
      .today-term-detail { font-size: 17px; }
      .section-head h2 { font-size: 24px; }
      .section-main-icon { width: 56px; height: 56px; flex-basis: 56px; }
      .news-title { font-size: 20px; }
      .news-summary { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <div class="brand-mark" aria-hidden="true">
        <img src="./assets/mg-logo.png" alt="" />
      </div>

      <h1>
        MG 금융 인사이트
        <span class="hero-title-date" id="todayLabelHero"></span>
      </h1>

      <div class="hero-actions">
        <a
          class="btn btn-primary"
          href="https://www.bok.or.kr/portal/bbs/B0000249/view.do?menuNo=200765&nttId=10096081"
          target="_blank"
          rel="noopener noreferrer"
        >
          원문 보기
        </a>
        <button class="btn btn-ghost" id="refreshTermBtn" type="button">
          오늘의 용어 바꾸기
        </button>
      </div>
    </header>

    <section class="grid">
      <article class="card">
        <h2 class="card-title">오늘의 용어</h2>
        <p class="card-desc">
          실무 판단에 자주 연결되는 금융·통화정책·건전성 지표 중심으로 제공합니다.
        </p>

        <div id="todayTermBox" style="margin-top: 12px;"></div>
      </article>
    </section>

    <section>
      <div class="section-head">
        <div>
          <div class="section-title-row">
            <span class="section-main-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M4 6h16" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                <path d="M4 12h16" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                <path d="M4 18h10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
              </svg>
            </span>
            <h2>
              최신 뉴스<span class="hero-title-date" id="todayLabelNews"></span>
            </h2>
          </div>
        </div>
      </div>

      <div id="newsContainer" class="news-list">
        <div class="loading">뉴스를 불러오는 중입니다...</div>
      </div>
    </section>

    <p class="footer-note">
      본 서비스는 학습 참고용이며, 최종 경영 판단은 원문 및 추가 검토와 함께 수행해야 합니다.
    </p>
  </div>

  <script src="./app.js"></script>
</body>
</html>
